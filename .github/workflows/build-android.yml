name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Install EAS CLI globally
        run: npm install -g eas-cli

      - name: Build Android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          {
            echo "=== eas version ==="
            eas --version
            echo "=== eas whoami ==="
            eas whoami
            echo "=== eas build ==="
            eas build --platform android --profile preview --non-interactive --wait; echo "Exit: $?"
          } > /tmp/build.out 2>&1 || true

      - name: Upload output to dpaste
        if: always()
        run: |
          URL=$(curl -s -X POST "https://dpaste.com/api/v2/" \
            -F "content=@/tmp/build.out" \
            -F "expiry_days=7" \
            -F "syntax=text" \
            -w "\n")
          echo "Dpaste URL: $URL"
