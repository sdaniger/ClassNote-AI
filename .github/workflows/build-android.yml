name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Debug EAS
        run: |
          echo "=== EAS version ==="
          eas --version
          echo "=== EAS node path ==="
          which eas
          echo "=== node version ==="
          node --version
          echo "=== EXPO_TOKEN exists ==="
          test -n "$EXPO_TOKEN" && echo "yes" || echo "no"
          echo "=== Expo auth file ==="
          cat ~/.expo/config.json 2>/dev/null || echo "no config file"

      - name: Build Android (preview APK) - with --wait
        run: |
          eas build --platform android --profile preview --non-interactive --no-wait --json 2>&1 | tee /tmp/eas-output.json || true
          echo "Exit code: $?"
          echo "=== Output ==="
          cat /tmp/eas-output.json

      - name: Upload EAS log
        uses: actions/upload-artifact@v4
        with:
          name: eas-output
          path: /tmp/eas-output.json

      - name: Wait for builds
        run: |
          # Check build every 30s for up to 5 min
          for i in $(seq 1 10); do
            sleep 30
            BUILDS=$(curl -s "https://api.expo.dev/graphql" \
              -H "Authorization: Bearer $EXPO_TOKEN" \
              -H "Content-Type: application/json" \
              --max-time 10 \
              -d '{"query":"{app{byId(appId:\"d6a3a075-11cb-44f7-ab93-1d23d283e97e\"){builds(offset:0,limit:5){id platform status createdAt}}}}"' | \
              python3 -c "import json,sys; d=json.load(sys.stdin); b=d.get('data',{}).get('app',{}).get('byId',{}).get('builds',[]); print(f'{len(b)} builds'); [print(f'  {x[\"id\"]} {x[\"platform\"]} {x[\"status\"]}') for x in b]")
            echo "Poll $i: $BUILDS"
            if echo "$BUILDS" | grep -qv "0 builds"; then
              echo "BUILD(S) FOUND!"
              break
            fi
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (production AAB)
        if: false
        run: echo "disabled"
