name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Collect info
        id: collect
        continue-on-error: true
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          {
            echo "=== node version ==="
            node -e "console.log(process.versions)"
            echo "=== which eas ==="
            which eas
            echo "=== Directory ==="
            pwd; ls -la
            echo "=== eas whoami ==="
            npx -y eas-cli@latest whoami
            echo "=== eas build ==="
            npx -y eas-cli@latest build --platform android --profile preview --non-interactive --no-wait; echo "Exit: $?"
          } > /tmp/build.out 2>&1

      - name: Upload output to dpaste
        if: always()
        run: |
          curl -s -X POST "https://dpaste.com/api/v2/" \
            -F "content=@/tmp/build.out" \
            -F "expiry_days=7" \
            -F "syntax=text" \
            -w "\n"
