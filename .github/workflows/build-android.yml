name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Expo (manual)
        run: |
          npm install -g eas-cli@latest
          echo "EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}" >> $GITHUB_ENV

      - name: Debug EAS
        run: |
          eas --version
          eas whoami 2>&1

      - name: Build Android (preview APK)
        run: |
          eas build --platform android --profile preview --non-interactive --no-wait --json 2>&1 | tee /tmp/eas-output.json
          echo "Exit code: $?"
          cat /tmp/eas-output.json

      - name: Upload EAS log
        uses: actions/upload-artifact@v4
        with:
          name: eas-output.json
          path: /tmp/eas-output.json

      - name: Check builds via GraphQL
        if: always()
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          curl -s "https://api.expo.dev/graphql" \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            --max-time 10 \
            -d '{"query":"{app{byId(appId:\"d6a3a075-11cb-44f7-ab93-1d23d283e97e\"){builds(offset:0,limit:5){id platform status}}}}"}' | python3 -m json.tool

      - name: Build Android (production AAB)
        if: false
        run: echo "disabled"
