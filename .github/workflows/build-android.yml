name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Expo
        run: |
          npm install -g eas-cli
          echo "EXPO_TOKEN=${{ secrets.EXPO_TOKEN }}" >> $GITHUB_ENV

      - name: Verify setup
        run: |
          which eas
          eas --version
          ls -la ~/.expo/ 2>/dev/null || echo "No .expo dir"
          echo "Token set: $(test -n \"$EXPO_TOKEN\" && echo yes || echo no)"

      - name: Validate project
        run: |
          eas build:version:list --platform android 2>&1 || echo "list not available"
          npx expo config --type public 2>&1 | head -20 || true

      - name: Build Android (preview APK)
        run: |
          eas build --platform android --profile preview --non-interactive --no-wait 2>&1
        timeout-minutes: 5

      - name: Check for created build
        run: |
          for i in 1 2 3 4 5; do
            sleep 10
            curl -s "https://api.expo.dev/graphql" \
              -H "Authorization: Bearer $EXPO_TOKEN" \
              -H "Content-Type: application/json" \
              --max-time 5 \
              -d '{"query":"{app{byId(appId:\"d6a3a075-11cb-44f7-ab93-1d23d283e97e\"){builds(offset:0,limit:3){id platform status}}}}"}' | \
              python3 -m json.tool
            echo "---"
          done
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
