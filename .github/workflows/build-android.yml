name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build Android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          > /tmp/build.out
          echo "=== node versions ===" >> /tmp/build.out
          node -e "console.log(process.versions)" >> /tmp/build.out 2>&1
          echo "=== which eas ===" >> /tmp/build.out
          which eas >> /tmp/build.out 2>&1
          echo "=== Directory ===" >> /tmp/build.out
          pwd >> /tmp/build.out 2>&1
          ls -la >> /tmp/build.out 2>&1
          echo "=== eas whoami ===" >> /tmp/build.out
          npx -y eas-cli@latest whoami >> /tmp/build.out 2>&1
          echo "=== eas build (no-wait) ===" >> /tmp/build.out
          npx -y eas-cli@latest build --platform android --profile preview --non-interactive --no-wait >> /tmp/build.out 2>&1; rc=$?
          echo "Exit code: $rc" >> /tmp/build.out
          echo "=== Full output ===" 
          cat /tmp/build.out
          exit $rc
        timeout-minutes: 5
