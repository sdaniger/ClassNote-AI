name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS version
        run: eas --version

      - name: Build (debug)
        run: |
          set -x
          eas build --platform android --profile preview --non-interactive --wait > /tmp/build.out 2>&1; rc=$?
          set +x
          echo "Exit code: $rc"
          echo "Output size: $(wc -c < /tmp/build.out) bytes"
          echo "=== Build output ==="
          cat /tmp/build.out
          echo "=== End ==="
          exit $rc
        timeout-minutes: 60
