name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Install EAS CLI globally
        run: npm install -g eas-cli

      - name: Build Android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          > /tmp/build.out
          echo "=== eas version ===" >> /tmp/build.out
          eas --version >> /tmp/build.out 2>&1 || echo "eas_version_exit: $?" >> /tmp/build.out
          echo "=== eas whoami ===" >> /tmp/build.out
          eas whoami >> /tmp/build.out 2>&1 || echo "eas_whoami_exit: $?" >> /tmp/build.out
          echo "=== eas build ===" >> /tmp/build.out
          eas build --platform android --profile preview --non-interactive --wait >> /tmp/build.out 2>&1; echo "eas_build_exit: $?" >> /tmp/build.out
          echo "=== done ===" >> /tmp/build.out

      - name: Show output
        if: always()
        run: |
          echo "File size: $(wc -c < /tmp/build.out)"
          echo '```'
          cat /tmp/build.out
          echo '```'
