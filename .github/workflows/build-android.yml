name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS version
        run: eas --version

      - name: Build Android (preview APK)
        run: |
          eas build --platform android --profile preview --non-interactive --wait --json 2>&1 | tee /tmp/eas-output.json
        timeout-minutes: 60

      - name: Check build result
        if: always()
        run: |
          echo "=== EAS Output ==="
          cat /tmp/eas-output.json
          echo "=== Builds found ==="
          curl -s "https://api.expo.dev/graphql" \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -H "Content-Type: application/json" \
            --max-time 10 \
            -d '{"query":"{app{byId(appId:\"d6a3a075-11cb-44f7-ab93-1d23d283e97e\"){builds(offset:0,limit:5){id platform status createdAt}}}}"' | \
            python3 -c "import json,sys; d=json.load(sys.stdin); b=d.get('data',{}).get('app',{}).get('byId',{}).get('builds',[]); print(f'{len(b)} builds'); [print(f'  {x[\"id\"]} {x[\"platform\"]} {x[\"status\"]}') for x in b]"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload EAS log
        uses: actions/upload-artifact@v4
        with:
          name: eas-output
          path: /tmp/eas-output.json

      - name: Build Android (production AAB)
        if: false
        run: echo "disabled"
