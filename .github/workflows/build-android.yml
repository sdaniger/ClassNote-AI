name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup EAS CLI
        run: |
          npm install -g eas-cli
          which eas
          eas --version

      - name: Build Android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_DEBUG: true
        run: |
          eas build --platform android --profile preview --non-interactive --wait > /tmp/build.out 2>&1; rc=$?
          {
            echo "### EAS Build Result"
            echo "Exit code: $rc"
            echo "Output size: $(wc -c < /tmp/build.out)"
            echo '```'
            cat /tmp/build.out
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          exit $rc
        timeout-minutes: 60
