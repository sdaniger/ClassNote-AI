name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      release:
        description: Create GitHub Release with APK
        type: boolean
        default: false
      version:
        description: Release version tag (e.g., v1.0.0)
        type: string
        required: false
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: apps/mobile

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties', 'apps/mobile/android/gradle.properties', 'apps/mobile/android/app/build.gradle', 'apps/mobile/android/build.gradle', 'apps/mobile/android/settings.gradle') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build APK (arm64-v8a)
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: classnote-mobile-apk
          path: apps/mobile/android/app/build/outputs/apk/**/*.apk
          compression-level: 0
          retention-days: 14

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="build-$(date +%Y%m%d-%H%M%S)"
          fi
          gh release create "$VERSION" \
            --title "ClassNote Mobile $VERSION" \
            --notes "APK build from workflow dispatch" \
            apps/mobile/android/app/build/outputs/apk/**/*.apk
