name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS version
        run: eas --version

      - name: Build Android (preview APK)
        run: |
          set -o pipefail
          eas build --platform android --profile preview --non-interactive --wait 2>&1 | tee /tmp/eas-output.txt
        timeout-minutes: 60

      - name: Upload EAS log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eas-output
          path: /tmp/eas-output.txt

      - name: Build Android (production AAB)
        if: false
        run: echo "disabled"
