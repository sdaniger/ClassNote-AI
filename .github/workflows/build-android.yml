name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS version
        run: eas --version

      - name: Build
        run: |
          set -o pipefail
          eas build --platform android --profile preview --non-interactive --wait 2>&1 | tee /tmp/build.log
        timeout-minutes: 60

      - name: Print build log
        if: always()
        run: |
          echo "=== BUILD LOG ==="
          cat /tmp/build.log 2>/dev/null || echo "(no log file)"
          echo "=== STEP SUMMARY ==="
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/build.log 2>/dev/null >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
