name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS version
        run: eas --version

      - name: Build
        run: |
          eas build --platform android --profile preview --non-interactive --wait > /tmp/build.out 2>&1
          exit_code=$?
          echo "Build exit code: $exit_code"
          if [ $exit_code -ne 0 ]; then
            echo "::error title=EAS Build Error::$(cat /tmp/build.out 2>/dev/null | head -c 500)"
          fi
          cat /tmp/build.out 2>/dev/null || echo "(empty output)"
          exit $exit_code
        timeout-minutes: 60
