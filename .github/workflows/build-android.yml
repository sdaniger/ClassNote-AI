name: Build Android (EAS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: apps/mobile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (preview APK)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: "1"
          EAS_PROJECT_ROOT: ${{ github.workspace }}/apps/mobile
        run: |
          eas build --platform android --profile preview --non-interactive --wait 2>&1
        timeout-minutes: 60
